services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextjs-dashboard
    restart: unless-stopped

    # Permet au conteneur d'atteindre PostgreSQL installé sur l'hôte VPS
    # via l'adresse "host.docker.internal"
    extra_hosts:
      - "host.docker.internal:host-gateway"

    ports:
      - "3000:3000"

    # Les variables sont définies dans l'interface Dokploy > Environment
    environment:
      - POSTGRES_URL
      - AUTH_SECRET
      - AUTH_URL
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
