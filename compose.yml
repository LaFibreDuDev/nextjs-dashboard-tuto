services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped

    # Permet au conteneur d'atteindre PostgreSQL installé sur l'hôte VPS
    # via l'adresse "host.docker.internal"
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"

    networks:
      - dokploy-network

    # Les variables sont définies dans l'interface Dokploy > Environment
    environment:
      - POSTGRES_URL
      - AUTH_SECRET
      - AUTH_URL
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  dokploy-network:
    external: true
